services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voice_room}
      POSTGRES_USER: ${POSTGRES_USER:-voice_room}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      TRUST_PROXY: ${TRUST_PROXY:-true}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-voice_room}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-voice_room}}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://${LIVEKIT_DOMAIN:-livekit.${DOMAIN}}}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}
      LIVEKIT_TOKEN_TTL_SECONDS: ${LIVEKIT_TOKEN_TTL_SECONDS:-21600}
      LIVEKIT_ROOM_PREFIX: ${LIVEKIT_ROOM_PREFIX:-voice-room-}
      MAX_ROOM_PEERS: ${MAX_ROOM_PEERS:-12}
      MAX_ROOMS: ${MAX_ROOMS:-100}
      MAX_EMPTY_ROOMS_PER_IP: ${MAX_EMPTY_ROOMS_PER_IP:-3}
      ROOM_CREATE_POW_DIFFICULTY: ${ROOM_CREATE_POW_DIFFICULTY:-14}
      ROOM_CREATE_POW_TTL_MS: ${ROOM_CREATE_POW_TTL_MS:-120000}
      ROOM_CREATE_RATE_LIMIT: ${ROOM_CREATE_RATE_LIMIT:-20}
      ROOM_CREATE_RATE_WINDOW_MS: ${ROOM_CREATE_RATE_WINDOW_MS:-60000}
      ROOM_CHAT_TTL_MS: ${ROOM_CHAT_TTL_MS:-604800000}
      ROOM_CHAT_MAX_MESSAGES: ${ROOM_CHAT_MAX_MESSAGES:-500}
      ROOM_CHAT_RATE_LIMIT: ${ROOM_CHAT_RATE_LIMIT:-60}
      ROOM_CHAT_RATE_WINDOW_MS: ${ROOM_CHAT_RATE_WINDOW_MS:-60000}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN:-livekit.${DOMAIN}}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        log_level: info
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}": "${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}"
    expose:
      - "7880"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
