services:
  voicechat:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-${DOMAIN}}
      STUN_URLS: ${STUN_URLS:-stun:stun.l.google.com:19302}
      TURN_HOST: ${TURN_HOST:-${PUBLIC_HOSTNAME:-${DOMAIN}}}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_SECRET: ${TURN_SECRET:-}
      MAX_ROOM_PEERS: ${MAX_ROOM_PEERS:-12}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - voicechat
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    profiles:
      - turn
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET:?set TURN_SECRET in .env}
      - --realm=${PUBLIC_HOSTNAME:-${DOMAIN}}
      - --listening-port=${TURN_PORT:-3478}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --no-cli
      - --no-multicast-peers

volumes:
  caddy_data:
  caddy_config:
